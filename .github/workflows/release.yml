name: Release Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build ReleaseSmall
        shell: bash
        run: |
          zig build -Doptimize=ReleaseSmall -Dversion=${{ steps.get_version.outputs.version }}


      - name: Download EnVar plugin for NSIS
        uses: carlosperate/download-file-action@v2
        with:
          file-url: https://nsis.sourceforge.io/mediawiki/images/7/7f/EnVar_plugin.zip
          file-name: envar_plugin.zip
          location: ${{ github.workspace }}

      - name: Extract EnVar plugin
        run: 7z x -o"${{ github.workspace }}/NSIS_Plugins" "${{ github.workspace }}/envar_plugin.zip"

      - name: 'Install makensis (choco)'
        run: choco install nsis

      - name: Create NSIS installer
        uses: joncloud/makensis-action@v5.0
        with:
          script-file: "${{ github.workspace }}/installer/installer.nsi"
          additional-plugin-paths: ${{ github.workspace }}/NSIS_Plugins/Plugins
          arguments: "/V2 -DVERSION=${{ steps.get_version.outputs.version }}"

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64
          path: zig-out/bin/descript.ion_fixer.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-installer
          path: installer/descript.ion_fixer_${{ steps.get_version.outputs.version }}_installer.exe


  create-release:
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"


      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64
          path: ./artifacts

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-installer
          path: ./artifacts

      - name: Create ZIP archive for executable
        shell: bash
        run: |
          cd artifacts
          zip descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64.zip descript.ion_fixer.exe
          rm descript.ion_fixer.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64.zip
            ./artifacts/descript.ion_fixer_${{ steps.get_version.outputs.version }}_installer.exe
          generate_release_notes: true
          draft: false
          prerelease: false
          tag_name: ${{ steps.get_version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
