name: Release Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string
        pattern: 'v[0-9]+\.[0-9]+\.[0-9]+'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Get version from tag
        id: get_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          # Remove 'v' prefix for zig build option
          VERSION_NO_V="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_no_v=$VERSION_NO_V" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build ReleaseSmall
        shell: bash
        run: |
          cp installer/icon.ico icon.ico
          zig build -Doptimize=ReleaseSmall -Dversion=${{ steps.get_version.outputs.version_no_v }}

      - name: Setup NSIS
        uses: joncloud/makensis-action@v2
        with:
          script-path: "${{ github.workspace }}/installer/installer.nsi"
          arguments: "/V2"

      - name: Build installer
        shell: bash
        run: |
          cd installer
          makensis -DVERSION=${{ steps.get_version.outputs.version_no_v }} installer.nsi

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64
          path: zig-out/bin/descript.ion_fixer.exe

      - name: Create ZIP archive
        shell: bash
        run: |
          cd zig-out/bin
          7z a -tzip ../../descript.ion_fixer-${{ steps.get_version.outputs.version }}-windows-x64.zip descript.ion_fixer.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: descript.ion_fixer-${{ steps.get_version.outputs.version }}-installer.exe
          path: installer/descript.ion_fixer_${{ steps.get_version.outputs.version_no_v }}_installer.exe

  create-release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: descript.ion_fixer-${{ github.ref_name }}-windows-x64
          path: ./artifacts

      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: descript.ion_fixer-${{ github.ref_name }}-installer.exe
          path: ./artifacts

      - name: Create ZIP archive for executable
        shell: bash
        run: |
          cd artifacts
          zip descript.ion_fixer-${{ github.ref_name }}-windows-x64.zip descript.ion_fixer.exe
          rm descript.ion_fixer.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/descript.ion_fixer-${{ github.ref_name }}-windows-x64.zip
            ./artifacts/descript.ion_fixer-${{ github.ref_name }}-installer.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
